# ──────────────────────────────────────────────────────────────────────────────
# QueueGate — GitHub Actions CI/CD Pipeline
# File: .github/workflows/deploy.yml
#
# Trigger: Push to `main` branch
#
# Pipeline stages:
#   1. test    — Run NestJS unit tests
#   2. build   — Build Docker images and push to Amazon ECR Public
#   3. deploy  — SSH into EC2, pull new images, restart services
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   AWS_ACCESS_KEY_ID         IAM user with ECR + ECR-Public permissions
#   AWS_SECRET_ACCESS_KEY     matching secret
#   EC2_HOST                  Elastic IP or domain of your EC2 instance
#   EC2_USER                  ubuntu
#   EC2_SSH_KEY               full content of your .pem private key file
#   EC2_DEPLOY_PATH           /opt/queuegate
#
# Optional but recommended:
#   SLACK_WEBHOOK_URL         for deploy notifications
# ──────────────────────────────────────────────────────────────────────────────

name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # ECR Public is free for public images — no cost for pulling
  ECR_REGISTRY: public.ecr.aws
  ECR_ALIAS: REPLACE_WITH_YOUR_ECR_PUBLIC_ALIAS   # e.g. a1b2c3d4e5f6
  IMAGE_API: queuegate-api
  IMAGE_WEB: queuegate-web

jobs:
  # ── Job 1: Run tests ─────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    # Only run tests on PRs and push — not on deploy-only changes
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test_secret
          POSTGRES_DB: queuegate_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: apps/api
        run: npx prisma generate --schema=./prisma/schema.prisma

      - name: Run database migrations (test DB)
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://postgres:test_secret@localhost:5432/queuegate_test
        run: npx prisma migrate deploy --schema=./prisma/schema.prisma

      - name: Run unit tests
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://postgres:test_secret@localhost:5432/queuegate_test
          REDIS_URL: redis://localhost:6379
          KAFKA_BROKERS: localhost:9092
          JWT_ACCESS_SECRET: test_access_secret_32_chars_minimum
          JWT_REFRESH_SECRET: test_refresh_secret_32_chars_minimum
          JWT_WS_SECRET: test_ws_secret_here_32_chars_minimum
          JWT_ACCESS_EXPIRES_IN: 15m
          JWT_REFRESH_EXPIRES_IN: 7d
          CHECKOUT_TOKEN_TTL_SECONDS: 600
          NODE_ENV: test
        run: pnpm test --passWithNoTests

  # ── Job 2: Build & push Docker images to ECR Public ─────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    # Only build on push to main (not on PRs)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      image_tag: ${{ steps.meta.outputs.sha_short }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag (short SHA)
        id: meta
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1   # ECR Public is always us-east-1

      - name: Login to Amazon ECR Public
        id: login-ecr-public
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Set up Docker Buildx (for cache & multi-platform)
        uses: docker/setup-buildx-action@v3

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          # Tag with both the short SHA and 'latest' for easy rollback
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_ALIAS }}/${{ env.IMAGE_API }}:${{ steps.meta.outputs.sha_short }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_ALIAS }}/${{ env.IMAGE_API }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          # NEXT_PUBLIC_ vars must be set at build time
          # These are read from GitHub secrets so they're in the bundle
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_WS_URL=${{ secrets.NEXT_PUBLIC_WS_URL }}
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_ALIAS }}/${{ env.IMAGE_WEB }}:${{ steps.meta.outputs.sha_short }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_ALIAS }}/${{ env.IMAGE_WEB }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 3: Deploy to EC2 ──────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://${{ secrets.EC2_HOST }}

    steps:
      - name: Checkout code (for docker-compose.prod.yml)
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
          ECR_REGISTRY: ${{ env.ECR_REGISTRY }}
          ECR_ALIAS: ${{ env.ECR_ALIAS }}
          IMAGE_API: ${{ env.IMAGE_API }}
          IMAGE_WEB: ${{ env.IMAGE_WEB }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: IMAGE_TAG,ECR_REGISTRY,ECR_ALIAS,IMAGE_API,IMAGE_WEB
          script: |
            set -euo pipefail
            cd ${{ secrets.EC2_DEPLOY_PATH }}

            echo "==> Pulling latest code..."
            git pull origin main

            echo "==> Authenticating with ECR Public..."
            aws ecr-public get-login-password --region us-east-1 \
              | docker login --username AWS --password-stdin public.ecr.aws

            echo "==> Pulling new images (tag: ${IMAGE_TAG})..."
            docker pull ${ECR_REGISTRY}/${ECR_ALIAS}/${IMAGE_API}:${IMAGE_TAG}
            docker pull ${ECR_REGISTRY}/${ECR_ALIAS}/${IMAGE_WEB}:${IMAGE_TAG}

            echo "==> Updating docker-compose.prod.yml to use pinned image tags..."
            # Override the build: sections to use pre-built images from ECR
            export API_IMAGE="${ECR_REGISTRY}/${ECR_ALIAS}/${IMAGE_API}:${IMAGE_TAG}"
            export WEB_IMAGE="${ECR_REGISTRY}/${ECR_ALIAS}/${IMAGE_WEB}:${IMAGE_TAG}"

            echo "==> Restarting services (zero-downtime rolling)..."
            # Restart infra first (postgres/redis/kafka rarely change)
            docker compose -f docker-compose.prod.yml --env-file .env.prod \
              up -d --no-build postgres redis kafka

            # Wait for infra to be healthy before rolling API
            sleep 10

            # Restart API with new image
            docker compose -f docker-compose.prod.yml --env-file .env.prod \
              up -d --no-build api

            # Wait for API health check
            timeout 120 bash -c 'until curl -sf http://localhost:4000/ready; do sleep 5; done'
            echo "==> API is healthy!"

            # Restart web with new image
            docker compose -f docker-compose.prod.yml --env-file .env.prod \
              up -d --no-build web

            echo "==> Cleaning up old Docker images..."
            docker image prune -f --filter "until=48h"

            echo "==> Deployment complete! Tag: ${IMAGE_TAG}"

      - name: Verify deployment health
        run: |
          sleep 15
          echo "Checking API health..."
          curl -f https://${{ secrets.EC2_HOST }}/api/ready || exit 1
          echo "✓ API is healthy"
          echo "Checking web..."
          curl -f https://${{ secrets.EC2_HOST }} || exit 1
          echo "✓ Web is healthy"

      - name: Post deployment summary
        if: always()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image Tag** | ${{ needs.build.outputs.image_tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Deployed At** | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| **URL** | https://${{ secrets.EC2_HOST }} |" >> $GITHUB_STEP_SUMMARY
