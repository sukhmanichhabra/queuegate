# ──────────────────────────────────────────────────────────────────────────────
# QueueGate — GitHub Actions CI/CD Pipeline
# File: .github/workflows/deploy.yml
#
# Trigger: Push to `main` branch
#
# Pipeline stages:
#   1. test    — Run NestJS unit tests
#   2. build   — Build Docker images on GitHub runners (16 GB RAM, FREE)
#               and push to GitHub Container Registry (GHCR)
#   3. deploy  — SSH into EC2, pull pre-built images, restart services
#               EC2 server NEVER builds images — only pulls & runs them.
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   GHCR_USERNAME             Your GitHub username (lowercase), e.g. sukhmanichhabra
#   GHCR_TOKEN                GitHub PAT with write:packages scope
#   EC2_HOST                  Public IP or domain of your EC2 instance
#   EC2_USER                  ubuntu
#   EC2_SSH_KEY               Full contents of your .pem private key file
#   EC2_DEPLOY_PATH           /opt/queuegate
#   NEXT_PUBLIC_API_URL       http://<your-ip-or-domain>/api
#   NEXT_PUBLIC_WS_URL        http://<your-ip-or-domain>
#
# To switch to your domain later, just update EC2_HOST, NEXT_PUBLIC_API_URL,
# and NEXT_PUBLIC_WS_URL in GitHub Secrets and push a new commit.
# ──────────────────────────────────────────────────────────────────────────────

name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  # Images will be: ghcr.io/sukhmanichhabra/queuegate-api
  #                 ghcr.io/sukhmanichhabra/queuegate-web
  IMAGE_API: ghcr.io/${{ github.repository_owner }}/queuegate-api
  IMAGE_WEB: ghcr.io/${{ github.repository_owner }}/queuegate-web

jobs:
  # ── Job 1: Run tests ─────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test_secret
          POSTGRES_DB: queuegate_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: apps/api
        run: npx prisma generate --schema=./prisma/schema.prisma

      - name: Run database migrations (test DB)
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://postgres:test_secret@localhost:5432/queuegate_test
        run: npx prisma migrate deploy --schema=./prisma/schema.prisma

      - name: Run unit tests
        env:
          DATABASE_URL: postgresql://postgres:test_secret@localhost:5432/queuegate_test
          REDIS_URL: redis://localhost:6379
          KAFKA_BROKERS: localhost:9092
          JWT_ACCESS_SECRET: test_access_secret_32_chars_minimum
          JWT_REFRESH_SECRET: test_refresh_secret_32_chars_minimum
          JWT_WS_SECRET: test_ws_secret_here_32_chars_minimum
          JWT_ACCESS_EXPIRES_IN: 15m
          JWT_REFRESH_EXPIRES_IN: 7d
          CHECKOUT_TOKEN_TTL_SECONDS: 600
          NODE_ENV: test
        run: |
          pnpm --filter api test --passWithNoTests > jest.log 2>&1 || echo "JEST_FAILED=true" >> $GITHUB_ENV
          echo "## Jest Logs" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          cat jest.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          if [ "$JEST_FAILED" = "true" ]; then
            exit 1
          fi

  # ── Job 2: Build & push Docker images to GitHub Container Registry ────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    # Only build on push to main (not on PRs)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      image_tag: ${{ steps.meta.outputs.sha_short }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag (short SHA)
        id: meta
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up Docker Buildx (for cache & multi-platform)
        uses: docker/setup-buildx-action@v3

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_API }}:${{ steps.meta.outputs.sha_short }}
            ${{ env.IMAGE_API }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          # NEXT_PUBLIC_ vars are baked into the browser bundle at build time.
          # They are read from GitHub Secrets here so the server never needs
          # to rebuild the image when you change these values — just update
          # the secret and push a commit to trigger a new build.
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_WS_URL=${{ secrets.NEXT_PUBLIC_WS_URL }}
          tags: |
            ${{ env.IMAGE_WEB }}:${{ steps.meta.outputs.sha_short }}
            ${{ env.IMAGE_WEB }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 3: Deploy to EC2 ──────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production

    steps:
      - name: Checkout code (for docker-compose.prod.yml)
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
          IMAGE_API: ${{ env.IMAGE_API }}
          IMAGE_WEB: ${{ env.IMAGE_WEB }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          DEPLOY_PATH: ${{ secrets.EC2_DEPLOY_PATH }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: IMAGE_TAG,IMAGE_API,IMAGE_WEB,GHCR_USERNAME,GHCR_TOKEN,DEPLOY_PATH
          script: |
            set -euo pipefail
            cd "$DEPLOY_PATH"

            echo "==> Pulling latest compose config..."
            git fetch origin main
            git reset --hard origin/main

            echo "==> Updating CORS_ORIGINS in .env.prod for domain migration..."
            sed -i 's|^CORS_ORIGINS=.*|CORS_ORIGINS=https://queuegate.sukhmanichhabra.tech|' .env.prod || echo "CORS_ORIGINS not found, skipping sed"

            echo "==> Logging into GitHub Container Registry..."
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

            echo "==> Pulling pre-built images (tag: ${IMAGE_TAG})..."
            docker pull ${IMAGE_API}:${IMAGE_TAG}
            docker pull ${IMAGE_WEB}:${IMAGE_TAG}

            echo "==> Tagging pulled images as 'latest' for compose..."
            docker tag ${IMAGE_API}:${IMAGE_TAG} ${IMAGE_API}:latest
            docker tag ${IMAGE_WEB}:${IMAGE_TAG} ${IMAGE_WEB}:latest

            echo "==> Starting infra services (postgres/redis/kafka)..."
            docker compose -f docker-compose.prod.yml --env-file .env.prod \
              up -d --no-build postgres redis kafka

            echo "==> Waiting for infra to be healthy..."
            sleep 15

            echo "==> Restarting API with new image..."
            docker compose -f docker-compose.prod.yml --env-file .env.prod \
              up -d --no-build api

            echo "==> Waiting for API health check..."
            timeout 120 bash -c 'until curl -sf http://localhost:4000/ready; do sleep 5; done'
            echo "==> API is healthy!"

            echo "==> Restarting web with new image..."
            docker compose -f docker-compose.prod.yml --env-file .env.prod \
              up -d --no-build web

            echo "==> Starting reverse proxy..."
            docker compose -f docker-compose.prod.yml --env-file .env.prod \
              up -d --no-build caddy

            echo "==> Cleaning up old Docker images (older than 48h)..."
            docker image prune -f --filter "until=48h"

            echo "==> Deployment complete! Tag: ${IMAGE_TAG}"

      - name: Verify deployment health
        run: |
          sleep 20
          echo "Checking web..."
          curl -f http://${{ secrets.EC2_HOST }} || exit 1
          echo "✓ Web is healthy"
          echo "Checking API..."
          curl -f http://${{ secrets.EC2_HOST }}/api/ready || exit 1
          echo "✓ API is healthy"

      - name: Post deployment summary
        if: always()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image Tag** | ${{ needs.build.outputs.image_tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Deployed At** | $(date -u '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| **URL** | http://${{ secrets.EC2_HOST }} |" >> $GITHUB_STEP_SUMMARY
