# ──────────────────────────────────────────────────────────────────────────────
# QueueGate — Lint & Unit Test CI
# File: .github/workflows/ci.yml
#
# Purpose: Fast pre-check on every push and PR.
#   - Lints both API and web
#   - Runs API unit tests (no infra services required)
#   - Runs Prisma client generation check
#
# Full CD pipeline (build Docker images + deploy to EC2) is handled by
# deploy.yml which runs on push to main.
# ──────────────────────────────────────────────────────────────────────────────

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-build-check:
    name: Test and Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter api exec prisma generate

      - name: Lint Projects
        run: pnpm run --filter api --filter web lint

      - name: Run API Unit Tests
        env:
          DATABASE_URL: postgresql://postgres:secret@localhost:5432/queuegate
          REDIS_URL: redis://localhost:6379
          KAFKA_BROKERS: localhost:9092
          JWT_ACCESS_SECRET: test_access_secret_32_chars_minimum
          JWT_REFRESH_SECRET: test_refresh_secret_32_chars_minimum
          JWT_WS_SECRET: test_ws_secret_here_32_chars_minimum
          JWT_ACCESS_EXPIRES_IN: 15m
          JWT_REFRESH_EXPIRES_IN: 7d
          CHECKOUT_TOKEN_TTL_SECONDS: 600
          NODE_ENV: test
        run: |
          pnpm --filter api test --passWithNoTests > jest.log 2>&1 || echo "JEST_FAILED=true" >> $GITHUB_ENV
          echo "## Jest Logs" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          cat jest.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          if [ "$JEST_FAILED" = "true" ]; then
            exit 1
          fi
