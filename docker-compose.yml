services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: queuegate
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:latest
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # EXTERNAL is mapped to 9092 (host port), INTERNAL is mapped to 29092 (docker network port)
      KAFKA_LISTENERS: EXTERNAL://0.0.0.0:9092,INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      # api container connects to kafka by service name on INTERNAL. Native tests connect via localhost on EXTERNAL.
      KAFKA_ADVERTISED_LISTENERS: EXTERNAL://localhost:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:29092"]
      interval: 15s
      timeout: 10s
      retries: 8

  api:
    build:
      # Context is the monorepo root so pnpm can access pnpm-workspace.yaml,
      # the root node_modules store, and both apps' package.json files.
      context: .
      dockerfile: apps/api/Dockerfile
    # Loads JWT secrets, expiry settings, and other non-connection-string vars
    # from the existing local .env. Connection strings (DATABASE_URL, REDIS_URL,
    # KAFKA_BROKERS) are overridden below via `environment:` to use container
    # service names instead of localhost (which would be self-referential inside
    # the api container). Compose `environment:` takes precedence over env_file.
    env_file:
      - apps/api/.env
    environment:
      DATABASE_URL: postgresql://postgres:secret@postgres:5432/queuegate
      REDIS_URL: redis://redis:6379
      KAFKA_BROKERS: kafka:29092
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/ready"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    # NEXT_PUBLIC_ vars are baked into the browser bundle at Next.js build time,
    # so the values here are only used if overriding the ARG defaults in the
    # Dockerfile. For local Docker usage, localhost:4000 is correct because
    # the browser runs on the host machine, not inside the Docker network.
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
      NEXT_PUBLIC_WS_URL: http://localhost:4000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

  prometheus:
    image: prom/prometheus
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - api

  grafana:
    image: grafana/grafana
    ports:
      - "3001:3000"
